<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">

    <title>Small Boxes in Big Box World</title>
</head>
<body>
    <div class="big-box">
        <div class="container container-top">
            <div class="small-box">
                <h3>A</h3>
            </div>
            <div class="small-box">
                <h3>B</h3>
            </div>
            <div class="small-box">
                <h3>C</h3>
            </div>
        </div>
        <div class="container container-mid">
            <div class="small-box">
                <h3>D</h3>
            </div>
            <div class="small-box">
                <h3>E</h3>
            </div>
            <div class="small-box">
                <h3>F</h3>
            </div>
        </div>
        <div class="container container-bot">
            <div class="small-box">
                <h3>G</h3>
            </div>
            <div class="small-box">
                <h3>H</h3>
            </div>
            <div class="small-box">
                <h3>I</h3>
            </div>
        </div>
    </div>
    
</body>
</html>
